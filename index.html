<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Diesel Tank | JFC Professional Equipment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fs-green: #4dbb3c;
            --fs-orange: #ff8c00;
            --fs-dark: #1a1c1e;
            --fs-panel: #2a2d31;
        }
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--fs-dark);
            color: #ffffff;
            scroll-behavior: smooth;
        }

        /* --- MECHANIKA LOGO --- */
        .logo-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .logo-container:hover {
            transform: scale(1.05);
        }
        .logo-text {
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            background: linear-gradient(90deg, #fff, #888, #fff);
            background-repeat: no-repeat;
            background-size: 80%;
            animation: shine 5s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: rgba(255, 255, 255, 0.9);
        }
        @keyframes shine {
            0% { background-position: -500%; }
            100% { background-position: 500%; }
        }
        .logo-sub {
            font-size: 0.6rem;
            letter-spacing: 4px;
            color: var(--fs-green);
            display: block;
            text-align: center;
            margin-top: -5px;
        }

        /* --- RESZTA STYLÓW --- */
        .fs-border { border: 2px solid #3d4147; transition: all 0.3s ease; }
        .fs-border:hover { border-color: var(--fs-green); box-shadow: 0 0 15px rgba(77, 187, 60, 0.3); }
        .stat-bar { height: 6px; background: #3d4147; border-radius: 2px; overflow: hidden; }
        .stat-fill { height: 100%; background: var(--fs-green); transition: width 1s ease-out; }
        .btn-action { background-color: var(--fs-orange); clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); transition: all 0.2s; }
        .btn-action:hover { transform: scale(1.05); background-color: #ffffff; color: #000; }
        .category-btn { background: #2a2d31; border: 1px solid #3d4147; transition: all 0.3s; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); }
        .category-btn.active { background: var(--fs-green); color: black; font-weight: bold; border-color: var(--fs-green); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="sticky top-0 z-50 bg-[#1a1c1e]/95 backdrop-blur-md border-b-2 border-[#4dbb3c] px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            
            <div class="hidden md:flex space-x-6 font-semibold uppercase tracking-widest text-xs">
                <a href="#katalog" class="hover:text-[#4dbb3c] transition-colors">Katalog</a>
                <a href="#kontakt" class="hover:text-[#4dbb3c] transition-colors">Wyślij zapytanie</a>
            </div>

            <div class="logo-container text-center" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
                <div class="logo-text text-2xl md:text-4xl">
                    Best <span class="text-[#4dbb3c]">Diesel</span> Tank
                </div>
                <span class="logo-sub font-bold italic">Authorized JFC Dealer</span>
            </div>

            <div class="flex items-center space-x-4">
                <div class="hidden sm:block text-right">
                    <div class="text-[#ff8c00] font-bold text-xs animate-pulse leading-none">STATUS: ONLINE</div>
                    <div class="text-[10px] text-gray-500 uppercase tracking-tighter">Support 24/7</div>
                </div>
                <div class="w-8 h-8 bg-[#4dbb3c] rounded-full flex items-center justify-center text-black font-bold">!</div>
            </div>
        </div>
    </nav>

    <header class="relative h-[50vh] flex items-center justify-center overflow-hidden bg-black">
        <div class="absolute inset-0 opacity-40">
            <img src="https://images.unsplash.com/photo-1590486803833-ffc475d491bc?auto=format&fit=crop&q=80" alt="Farm" class="w-full h-full object-cover">
        </div>
        <div class="relative z-10 text-center px-4">
            <h1 class="text-4xl md:text-7xl font-black uppercase italic tracking-tighter mb-2">
                ZBIORNIKI <span class="text-[#4dbb3c]">KLASY PREMIUM</span>
            </h1>
            <p class="text-sm md:text-xl text-gray-300 max-w-3xl mx-auto mb-8 font-light uppercase tracking-widest">
                Dostarczamy paliwo tam, gdzie pracują najlepsi.
            </p>
        </div>
    </header>

    <section id="katalog" class="py-12 px-6 max-w-7xl mx-auto">
        <div class="text-center mb-12">
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="changeCategory('diesel', this)" class="category-btn active px-6 py-2 uppercase text-xs">Olej Napędowy</button>
                <button onclick="changeCategory('adblue', this)" class="category-btn px-6 py-2 uppercase text-xs">AdBlue</button>
                <button onclick="changeCategory('woda', this)" class="category-btn px-6 py-2 uppercase text-xs">Woda</button>
                <button onclick="changeCategory('olej', this)" class="category-btn px-6 py-2 uppercase text-xs">Olej Opałowy</button>
            </div>
        </div>

        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </section>

    <section id="kontakt" class="py-16 bg-[#141517] border-y-2 border-gray-800">
        <div class="max-w-4xl mx-auto px-6">
            <div class="bg-[#2a2d31] p-6 fs-border">
                <h2 class="text-3xl font-bold uppercase mb-6 italic text-[#ff8c00]">Szybka wycena - Best Diesel Tank</h2>
                <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <input type="text" id="selected_model" placeholder="Model" class="w-full bg-[#1a1c1e] border border-gray-700 p-3 text-[#4dbb3c] font-bold outline-none" readonly>
                    </div>
                    <input type="text" id="name" placeholder="Imię / Nazwa firmy" class="w-full bg-[#1a1c1e] border border-gray-700 p-3 outline-none">
                    <input type="tel" id="phone" placeholder="Telefon" class="w-full bg-[#1a1c1e] border border-gray-700 p-3 outline-none">
                    <div class="md:col-span-2">
                        <button type="button" onclick="confirmOrder()" class="btn-action w-full py-4 text-xl font-bold text-black uppercase">Wyślij do doradcy</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center text-gray-700 text-[10px] uppercase tracking-[0.5em]">
        Best Diesel Tank &copy; 2024 | Dealer Premium JFC Polska
    </footer>

    <script>
        const db = [
            {
                id: "JFC-2500-DUO",
                cat: "diesel",
                name: "JFC 2500 Diesel Duo",
                vol: "2500 L",
                stats: { capacity: 45, durability: 98 },
                features: ["Pompa 72 l/min", "Atest UDT", "System DuoSeal"],
                img: "https://via.placeholder.com/400x300/2a2d31/4dbb3c?text=JFC+2500+DUO"
            },
            {
                id: "JFC-5000-PRO",
                cat: "diesel",
                name: "JFC 5000 Professional",
                vol: "5000 L",
                stats: { capacity: 85, durability: 95 },
                features: ["Zwijadło 8-12m", "Filtr Szklany", "Wysoka Wydajność"],
                img: "https://via.placeholder.com/400x300/2a2d31/4dbb3c?text=JFC+5000+PRO"
            }
        ];

        function renderProducts(category) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            const filtered = db.filter(item => item.cat === category);
            
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="fs-panel fs-border p-6 rounded-sm bg-[#2a2d31] relative group animate-fade-in">
                        <div class="h-40 flex items-center justify-center mb-4">
                            <img src="${p.img}" alt="${p.name}" class="max-h-full group-hover:scale-110 transition-transform duration-500">
                        </div>
                        <h3 class="text-xl font-bold uppercase italic mb-4 border-l-4 border-[#4dbb3c] pl-3">${p.name}</h3>
                        <div class="space-y-3 mb-6">
                            <div class="text-[10px] uppercase text-gray-500 flex justify-between"><span>Pojemność</span><span>${p.vol}</span></div>
                            <div class="stat-bar"><div class="stat-fill" style="width: ${p.stats.capacity}%"></div></div>
                        </div>
                        <ul class="text-[10px] text-gray-400 mb-6 grid grid-cols-2 gap-1 uppercase">
                            ${p.features.map(f => `<li class="flex items-center"><span class="w-1 h-1 bg-[#4dbb3c] mr-2"></span>${f}</li>`).join('')}
                        </ul>
                        <button onclick="selectForContact('${p.name}')" class="w-full bg-[#3d4147] hover:bg-[#4dbb3c] hover:text-black py-3 text-xs font-bold uppercase transition-all">Konfiguruj</button>
                    </div>
                `;
            });
        }

        function changeCategory(cat, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(cat);
        }

        function selectForContact(model) {
            document.getElementById('selected_model').value = model;
            document.getElementById('kontakt').scrollIntoView({ behavior: 'smooth' });
        }

        function confirmOrder() {
            const name = document.getElementById('name').value;
            if(name) alert("Wiadomość wysłana! Doradca Best Diesel Tank oddzwoni do Państwa.");
            else alert("Proszę podać dane kontaktowe.");
        }

        window.onload = () => renderProducts('diesel');
    </script>
</body>
</html>

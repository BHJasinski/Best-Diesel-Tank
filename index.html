<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Diesel Tank | Certyfikowany Dealer JFC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fs-green: #4dbb3c;
            --fs-orange: #ff8c00;
            --fs-dark: #1a1c1e;
            --fs-panel: #2a2d31;
        }
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--fs-dark);
            color: #ffffff;
            scroll-behavior: smooth;
        }

        /* --- NOWA MECHANIKA LOGO BDT --- */
        .logo-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .logo-bdt {
            height: 60px; /* Możesz dostosować wysokość */
            width: auto;
            filter: drop-shadow(0 0 0px rgba(77, 187, 60, 0));
            transition: all 0.4s ease;
            animation: logo-glow 3s infinite alternate;
        }

        .logo-wrapper:hover {
            transform: scale(1.08);
        }

        .logo-wrapper:hover .logo-bdt {
            filter: drop-shadow(0 0 15px rgba(77, 187, 60, 0.6));
        }

        @keyframes logo-glow {
            from { filter: drop-shadow(0 0 2px rgba(77, 187, 60, 0.2)); }
            to { filter: drop-shadow(0 0 8px rgba(77, 187, 60, 0.5)); }
        }

        .logo-sub {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--fs-green);
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 4px;
            opacity: 0.9;
        }

        /* --- RESZTA STYLÓW --- */
        .fs-border { border: 2px solid #3d4147; transition: all 0.3s ease; }
        .fs-border:hover { border-color: var(--fs-green); box-shadow: 0 0 15px rgba(77, 187, 60, 0.3); }
        .stat-bar { height: 6px; background: #3d4147; border-radius: 2px; overflow: hidden; }
        .stat-fill { height: 100%; background: var(--fs-green); transition: width 1s ease-out; }
        .btn-action { background-color: var(--fs-orange); clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); transition: all 0.2s; }
        .btn-action:hover { transform: scale(1.05); background-color: #ffffff; color: #000; }
        .category-btn { background: #2a2d31; border: 1px solid #3d4147; transition: all 0.3s; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); }
        .category-btn.active { background: var(--fs-green); color: black; font-weight: bold; border-color: var(--fs-green); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="sticky top-0 z-50 bg-[#1a1c1e]/95 backdrop-blur-md border-b-2 border-[#4dbb3c] px-6 py-2">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            
            <div class="hidden md:flex space-x-8 font-semibold uppercase tracking-widest text-xs">
                <a href="#katalog" class="hover:text-[#4dbb3c] transition-colors">Maszyny</a>
                <a href="#kontakt" class="hover:text-[#4dbb3c] transition-colors">Kontakt</a>
            </div>

            <div class="logo-wrapper cursor-pointer" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
                <img src="logo%20BDT.png" alt="Best Diesel Tank Logo" class="logo-bdt">
                <span class="logo-sub">Certyfikowany Dealer JFC</span>
            </div>

            <div class="flex items-center space-x-4">
                <div class="hidden sm:block text-right">
                    <div class="text-[#ff8c00] font-bold text-xs animate-pulse leading-none">EKSPERT DOSTĘPNY</div>
                    <div class="text-[10px] text-gray-500 uppercase tracking-tighter">Doradztwo techniczne</div>
                </div>
            </div>
        </div>
    </nav>

    <header class="relative h-[40vh] flex items-center justify-center overflow-hidden bg-black border-b border-gray-800">
        <div class="absolute inset-0 opacity-30">
            <img src="https://images.unsplash.com/photo-1590486803833-ffc475d491bc?auto=format&fit=crop&q=80" alt="Farm" class="w-full h-full object-cover">
        </div>
        <div class="relative z-10 text-center px-4">
            <h1 class="text-4xl md:text-6xl font-black uppercase italic tracking-tighter mb-2">
                Profesjonalne <span class="text-[#4dbb3c]">Zbiorniki</span>
            </h1>
            <p class="text-xs md:text-lg text-gray-300 max-w-3xl mx-auto font-light uppercase tracking-[0.3em]">
                Best Diesel Tank – Niezależna Jakość
            </p>
        </div>
    </header>

    <section id="katalog" class="py-12 px-6 max-w-7xl mx-auto">
        <div class="text-center mb-12">
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="changeCategory('diesel', this)" class="category-btn active px-6 py-2 uppercase text-xs">Olej Napędowy</button>
                <button onclick="changeCategory('adblue', this)" class="category-btn px-6 py-2 uppercase text-xs">AdBlue</button>
                <button onclick="changeCategory('woda', this)" class="category-btn px-6 py-2 uppercase text-xs">Woda</button>
                <button onclick="changeCategory('olej', this)" class="category-btn px-6 py-2 uppercase text-xs">Olej Opałowy</button>
            </div>
        </div>

        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>

    <section id="kontakt" class="py-16 bg-[#141517] border-y-2 border-gray-800">
        <div class="max-w-4xl mx-auto px-6">
            <div class="bg-[#2a2d31] p-6 fs-border">
                <h2 class="text-3xl font-bold uppercase mb-6 italic text-[#ff8c00]">Zapytaj o Best Diesel Tank</h2>
                <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <input type="text" id="selected_model" placeholder="Wybierz model z katalogu" class="w-full bg-[#1a1c1e] border border-gray-700 p-3 text-[#4dbb3c] font-bold outline-none" readonly>
                    </div>
                    <input type="text" id="name" placeholder="Imię / Firma" class="w-full bg-[#1a1c1e] border border-gray-700 p-3 outline-none">
                    <input type="tel" id="phone" placeholder="Numer telefonu" class="w-full bg-[#1a1c1e] border border-gray-700 p-3 outline-none">
                    <div class="md:col-span-2">
                        <button type="button" onclick="confirmOrder()" class="btn-action w-full py-4 text-xl font-bold text-black uppercase">Wyślij prośbę o kontakt</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center text-gray-700 text-[10px] uppercase tracking-[0.5em]">
        Best Diesel Tank &copy; 2026 | Niezależny Dystrybutor Certyfikowany JFC
    </footer>

    <script>
        // Przykład bazy z Twoimi nazwami pól
        const db = [
            {
                id: "JFC-2500-DUO",
                cat: "diesel",
                name: "JFC 2500 Diesel Duo",
                vol: "2500 L",
                stats: { capacity: 45, durability: 98 },
                features: ["Pompa 72 l/min", "Atest UDT", "Dwupłaszczowy"],
                img: "https://via.placeholder.com/400x300/2a2d31/4dbb3c?text=2500+DUO"
            }
        ];

        function renderProducts(category) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            const filtered = db.filter(item => item.cat === category);
            
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="fs-panel fs-border p-6 rounded-sm bg-[#2a2d31] relative group animate-fade-in">
                        <div class="h-40 flex items-center justify-center mb-4">
                            <img src="${p.img}" alt="${p.name}" class="max-h-full group-hover:scale-110 transition-transform duration-500">
                        </div>
                        <h3 class="text-xl font-bold uppercase italic mb-4 border-l-4 border-[#4dbb3c] pl-3">${p.name}</h3>
                        <div class="space-y-3 mb-6">
                            <div class="text-[10px] uppercase text-gray-500 flex justify-between"><span>Pojemność</span><span>${p.vol}</span></div>
                            <div class="stat-bar"><div class="stat-fill" style="width: ${p.stats.capacity}%"></div></div>
                        </div>
                        <ul class="text-[10px] text-gray-400 mb-6 grid grid-cols-2 gap-1 uppercase">
                            ${p.features.map(f => `<li class="flex items-center"><span class="w-1 h-1 bg-[#4dbb3c] mr-2"></span>${f}</li>`).join('')}
                        </ul>
                        <button onclick="selectForContact('${p.name}')" class="w-full bg-[#3d4147] hover:bg-[#4dbb3c] hover:text-black py-3 text-xs font-bold uppercase transition-all">Konfiguruj</button>
                    </div>
                `;
            });
        }

        function changeCategory(cat, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(cat);
        }

        function selectForContact(model) {
            document.getElementById('selected_model').value = model;
            document.getElementById('kontakt').scrollIntoView({ behavior: 'smooth' });
        }

        function confirmOrder() {
            const name = document.getElementById('name').value;
            if(name) alert("Dziękujemy! Doradca Best Diesel Tank skontaktuje się z Tobą wkrótce.");
            else alert("Proszę podać dane kontaktowe.");
        }

        window.onload = () => renderProducts('diesel');
    </script>
</body>
</html>
